<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Lid -->
  <rect x="24" y="28" width="80" height="10" rx="3" fill="#D4A574"/>
  <rect x="20" y="34" width="88" height="6" rx="2" fill="#C4956A"/>
  <!-- Straw -->
  <rect x="72" y="4" width="6" height="40" rx="2" fill="#9B7EC8" transform="rotate(8 75 24)"/>
  <!-- Cup body (trapezoid) -->
  <polygon points="28,40 100,40 92,118 36,118" fill="#F5F0EB" opacity="0.9"/>
  <polygon points="28,40 100,40 92,118 36,118" fill="none" stroke="#D4A574" stroke-width="2.5"/>
  <!-- Tea fill -->
  <polygon points="32,56 96,56 92,118 36,118" fill="#9B7EC8" opacity="0.35"/>
  <!-- Boba pearls -->
  <circle cx="52" cy="100" r="7" fill="#4A3560"/>
  <circle cx="70" cy="104" r="7" fill="#4A3560"/>
  <circle cx="60" cy="90" r="7" fill="#4A3560"/>
  <circle cx="76" cy="92" r="6.5" fill="#4A3560"/>
  <circle cx="44" cy="88" r="6.5" fill="#4A3560"/>
  <circle cx="48" cy="76" r="6" fill="#4A3560" opacity="0.7"/>
  <circle cx="68" cy="78" r="6" fill="#4A3560" opacity="0.7"/>
  <!-- Pearl highlights -->
  <circle cx="50" cy="98" r="2" fill="#7B5EA0" opacity="0.6"/>
  <circle cx="68" cy="102" r="2" fill="#7B5EA0" opacity="0.6"/>
  <circle cx="58" cy="88" r="2" fill="#7B5EA0" opacity="0.6"/>
  <!-- Cup shine -->
  <line x1="34" y1="48" x2="38" y2="110" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
