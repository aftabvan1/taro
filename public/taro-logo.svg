<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="120" rx="16" fill="#111111"/>

  <!-- Purple rounded square icon -->
  <rect x="10" y="10" width="100" height="100" rx="24" fill="url(#purpleGrad)"/>

  <!-- Boba cup -->
  <g transform="translate(60, 60)">
    <!-- Cup body -->
    <path d="M-18 -12 L-14 28 C-14 32 -10 34 -6 34 L6 34 C10 34 14 32 14 28 L18 -12Z" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cup lid -->
    <line x1="-22" y1="-12" x2="22" y2="-12" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Straw -->
    <line x1="4" y1="-30" x2="0" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Boba pearls -->
    <circle cx="-4" cy="22" r="4" fill="white" opacity="0.8"/>
    <circle cx="6" cy="24" r="4" fill="white" opacity="0.8"/>
    <circle cx="0" cy="14" r="4" fill="white" opacity="0.6"/>
    <circle cx="-8" cy="14" r="3.5" fill="white" opacity="0.5"/>
    <circle cx="8" cy="15" r="3.5" fill="white" opacity="0.5"/>
  </g>

  <!-- "taro." text -->
  <text x="135" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="600" fill="white" letter-spacing="-1">taro.</text>

  <defs>
    <linearGradient id="purpleGrad" x1="10" y1="10" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9b7ec8"/>
      <stop offset="100%" stop-color="#7c5db5"/>
    </linearGradient>
  </defs>
</svg>
